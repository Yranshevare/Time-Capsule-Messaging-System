<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Message Scheduler and History Dashboard</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#524af2",
                        "background-light": "#f6f6f8",
                        "background-dark": "#111022",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: { "DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>

<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen font-display">
    <div class="flex flex-col min-h-screen">
        <!-- Top Navigation Bar -->
        <header
            class="sticky top-0 z-50 bg-white/80 dark:bg-background-dark/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 px-6 lg:px-10 py-3">
            <div class="max-w-7xl mx-auto flex items-center justify-between gap-8">
                <div class="flex items-center gap-8">
                    <div class="flex items-center gap-3 text-primary">
                        <div class="size-8 bg-primary/10 rounded-lg flex items-center justify-center">
                            <span class="material-symbols-outlined text-primary">rocket_launch</span>
                        </div>
                        <h2 class="text-slate-900 dark:text-slate-100 text-xl font-bold tracking-tight">FintechFlow</h2>
                    </div>
                    <nav class="hidden md:flex items-center gap-6">
                        <a class="text-primary text-sm font-semibold border-b-2 border-primary py-1"
                            href="#">Sent</a>
                        <a class="text-slate-500 hover:text-primary dark:text-slate-400 dark:hover:text-primary text-sm font-medium transition-colors"
                            href="../inbox/index.html">Inbox</a>
                    </nav>
                </div>
                <div class="flex items-center gap-4">
                    <div class="flex gap-2">
                        <button
                            class="p-2 rounded-xl bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors">
                            <span class="material-symbols-outlined">account_circle</span>
                        </button>
                    </div>
                </div>
            </div>
        </header>
        <main class="flex-1 max-w-7xl mx-auto w-full p-6 lg:p-10">
            <!-- Page Header -->
            <div class="mb-8">
                <h1 class="text-3xl font-extrabold text-slate-900 dark:text-slate-100 tracking-tight">Message Center
                </h1>
                <p class="text-slate-500 dark:text-slate-400 mt-1">Schedule new communications and track delivery
                    status.</p>
            </div>
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                <!-- Left Section: Schedule a Message Form -->
                <section class="lg:col-span-5 space-y-6">
                    <div
                        class="bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm p-6">
                        <div class="flex items-center gap-3 mb-6">
                            <span class="material-symbols-outlined text-primary">event_upcoming</span>
                            <h2 class="text-xl font-bold text-slate-900 dark:text-slate-100">Schedule a Message</h2>
                        </div>
                        <form id="sendMessageForm" class="space-y-5">
                            <div>
                                <label
                                    class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Recipient
                                    Name</label>
                                <div class="relative">
                                    <span
                                        class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">person</span>
                                    <input
                                    id="name"
                                        class="w-full pl-10 pr-4 py-3 rounded-lg border border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-950 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all"
                                        placeholder="e.g. Sarah Jenkins" type="text" />
                                </div>
                            </div>
                            <div>
                                <label
                                    class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Delivery
                                    Time</label>
                                <div class="relative">
                                    <span
                                        class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">schedule</span>
                                    <input
                                    id="time"
                                        class="w-full pl-10 pr-4 py-3 rounded-lg border border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-950 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all"
                                        type="datetime-local" />
                                </div>
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Your
                                    Message</label>
                                <textarea
                                id="message"
                                    class="w-full px-4 py-3 rounded-lg border border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-950 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all resize-none"
                                    placeholder="Write your notification or message here..." rows="5"></textarea>
                            </div>
                            <button
                                class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/25 transition-all flex items-center justify-center gap-2 mt-4"
                                type="submit">
                                <span class="material-symbols-outlined">send</span>
                                Schedule Message
                            </button>
                        </form>
                    </div>
                    <!-- Quick Stats Component -->
                    <div class="grid grid-cols-2 gap-4">
                        <div
                            class="bg-white dark:bg-slate-900 p-4 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm">
                            <p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">Pending</p>
                            <p class="text-2xl font-black text-slate-900 dark:text-slate-100">12</p>
                        </div>
                        <div
                            class="bg-white dark:bg-slate-900 p-4 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm">
                            <p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">Delivered</p>
                            <p class="text-2xl font-black text-slate-900 dark:text-slate-100">1,284</p>
                        </div>
                    </div>
                </section>
                <!-- Right Section: Message History -->
                <section class="lg:col-span-7">
                    <div
                        class="bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm h-full flex flex-col">
                        <div
                            class="p-6 border-b border-slate-200 dark:border-slate-800 flex items-center justify-between">
                            <div class="flex items-center gap-3">
                                <span class="material-symbols-outlined text-primary">history</span>
                                <h2 class="text-xl font-bold text-slate-900 dark:text-slate-100">Message History</h2>
                            </div>
                            <button class="text-primary text-sm font-semibold hover:underline">View All</button>
                        </div>
                        <div id="messages" class="flex-1 overflow-y-auto p-6 space-y-4 max-h-[700px]">
                            <!-- diplay message history here -->
                        </div>
                        <!-- Footer Link -->
                        <div class="p-4 bg-slate-50 dark:bg-slate-800/50 text-center rounded-b-xl">
                            <button
                                class="text-slate-500 hover:text-primary text-sm font-medium flex items-center justify-center gap-2 w-full">
                                Load more history
                                <span class="material-symbols-outlined text-[18px]">expand_more</span>
                            </button>
                        </div>
                    </div>
                </section>
            </div>
        </main>
        <!-- Footer -->
        <footer
            class="bg-white dark:bg-background-dark border-t border-slate-200 dark:border-slate-800 py-6 px-10 text-center">
            <p class="text-slate-400 text-sm">© 2023 FintechFlow Platform. All rights reserved.</p>
        </footer>
    </div>
    <script src="./app.js"></script>
</body>

</html>
